<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left ear outer -->
  <polygon points="4,13 8,1 14,11" fill="#FF7722"/>
  <!-- Left ear inner (dark) -->
  <polygon points="6.5,12 8,4 12,11" fill="#2a0a00"/>

  <!-- Right ear outer -->
  <polygon points="28,13 24,1 18,11" fill="#FF7722"/>
  <!-- Right ear inner (dark) -->
  <polygon points="25.5,12 24,4 20,11" fill="#2a0a00"/>

  <!-- Head -->
  <circle cx="16" cy="19" r="13" fill="#FF7722"/>

  <!-- White/cream muzzle -->
  <ellipse cx="16" cy="23" rx="7" ry="5" fill="#fce8c8"/>

  <!-- Eyes -->
  <circle cx="12" cy="17" r="2.5" fill="#1a0a00"/>
  <circle cx="20" cy="17" r="2.5" fill="#1a0a00"/>
  <!-- Eye sparkles -->
  <circle cx="13" cy="16" r="0.9" fill="white"/>
  <circle cx="21" cy="16" r="0.9" fill="white"/>

  <!-- Nose -->
  <ellipse cx="16" cy="21" rx="2" ry="1.5" fill="#1a0a00"/>

  <!-- Cheek blush dots -->
  <circle cx="10" cy="22" r="1.2" fill="#e05020" opacity="0.45"/>
  <circle cx="22" cy="22" r="1.2" fill="#e05020" opacity="0.45"/>
</svg>
